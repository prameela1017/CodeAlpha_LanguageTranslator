<!DOCTYPE html>
<html>
<head>
    <title>Translator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
        }
        .card {
            border-radius: 20px;
        }
        textarea {
            height: 120px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🌍 Language Translator</h2>

        <form method="POST">

            <textarea name="text" class="form-control mb-3"
                placeholder="Enter text">{{ original_text }}</textarea>

            <div class="row mb-3">
                <div class="col">
                    <select name="source" class="form-select">
                        <option value="en">English</option>
                        <option value="te">Telugu</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>

                <div class="col">
                    <select name="target" class="form-select">
                        <option value="te">Telugu</option>
                        <option value="en">English</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-primary">Translate</button>
                <button type="button" onclick="swapLang()" class="btn btn-secondary">🔄 Swap</button>
                <button type="button" onclick="clearText()" class="btn btn-danger">Clear</button>
            </div>

        </form>

        <hr>

        <h5>Result:</h5>
        <p id="result">{{ translated_text }}</p>

        <div class="mt-2">
            <button onclick="copyText()" class="btn btn-success">📋 Copy</button>
            <button onclick="speakText()" class="btn btn-warning">🔊 Speak</button>
        </div>

    </div>
</div>

<script>
function copyText() {
    var text = document.getElementById("result").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function speakText() {
    var text = document.getElementById("result").innerText;
    var speech = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.speak(speech);
}

function swapLang() {
    let src = document.querySelector('[name="source"]');
    let tgt = document.querySelector('[name="target"]');

    let temp = src.value;
    src.value = tgt.value;
    tgt.value = temp;
}

function clearText() {
    document.querySelector("textarea").value = "";
    document.getElementById("result").innerText = "";
}
</script>

</body>
</html>
